<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rich!!</title>
    <style>
      body {
        background-color: white;
        text-align: center;
        font-family: Avenir, sans-serif;
        animation: fadein 1.5s ease-in-out;
      }
      @keyframes fadein {
        0% { opacity: 0; }
        100% { opacity: 1; }
      }
      h1 {
        margin-top: 80px;
        font-size: 3rem;
      }
      img {
        width: 300px;
        margin-top: 30px;
      }
      p {
        font-size: 1.2rem;
        margin-top: 20px;
        color: #333;
      }
      a {
        display: inline-block;
        margin-top: 40px;
        font-size: 1rem;
        color: #333;
        text-decoration: none;
        border-bottom: 1px solid #333;
        padding-bottom: 2px;
      }
      a:hover {
        opacity: 0.6;
      }
    </style>
  </head>
  <body>
    <h1>Rich!! :D</h1>
    <img src="cash.png" alt="cash">
    <p>You made it. Against all odds.</p>
    <br>
    <a href="index.html">play again</a>
  </body>
</html>
