<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=replay" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIE</title>
    <style>
      @keyframes fadein { 0% {opacity: 0;} 100% {opacity: 1;} }
      body { animation: fadein 1.5s ease-in-out; background: white; }
      .material-symbols-outlined { position: absolute; top: 30px; right: 30px; cursor: pointer; }
      #Skull { position: absolute; top: 50%; left: 50%; height: 40%; transform: translate(-50%, -50%); width: auto; }
      @keyframes fadeOut { 0% {opacity: 1;} 100% {opacity: 0;} }
      .fade-out-active { animation: fadeOut 2s ease-in-out forwards; }
    </style>
  </head>
  <body>
    <img id="Skull" src="skull.png" alt="skull">
    <a href="index.html" id="pagelink" class="icon-link"><span class="material-symbols-outlined">replay</span></a>
    <script>
      const link = document.getElementById("pagelink");
      link.addEventListener("click", function(e) {
        e.preventDefault();
        document.body.classList.add("fade-out-active");
        setTimeout(() => { window.location.href = link.href; }, 2000);
      });
    </script>
  </body>
</html>
